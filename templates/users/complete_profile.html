<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            min-height: 100vh;
        }

        .profile-card {
            max-width: 500px;
            width: 100%;
            border-radius: 15px;
            padding: 25px;
        }

        .title {
            font-weight: bold;
            color: #6610f2;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">

    <div class="card shadow-lg profile-card">
        <h2 class="text-center title mb-4">Complete Profile</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="full_name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone_number" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Guardian Number</label>
                <input type="text" name="guardian_number" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Admission Number</label>
                <input type="text" name="admission_number" class="form-control" required>
            </div>

            <div class="mb-3">
            <label class="form-label">Select Course</label>
                <select name="course_id" class="form-control" required>
                <option value="">-- Select Course --</option>
            {% for course in courses %}
            <option value="{{ course.id }}">{{ course.name }}</option>
             {% endfor %}
        </select>
        </div>

           

            <button type="submit" class="btn btn-primary w-100">Save Profile</button>
        </form>
    </div>

</body>
</html>
