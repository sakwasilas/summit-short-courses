<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #6f42c1, #ff6f61);
            height: 100vh;
        }

        .register-card {
            max-width: 400px;
            width: 100%;
            border-radius: 12px;
            padding: 20px;
        }

        .register-title {
            font-weight: bold;
            color: #6f42c1;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #6f42c1;
        }

        .btn-success {
            background-color: #6f42c1;
            border: none;
        }

        .btn-success:hover {
            background-color: #5a2d8b;
        }

        .form-footer {
            font-size: 0.9rem;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

    <div class="card shadow-lg register-card">
        <h2 class="text-center register-title mb-4">Student Registration</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="alert-area"></div>

        <form method="POST" onsubmit="return validatePassword()">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a password" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="Confirm your password" required>
            </div>

            <button type="submit" class="btn btn-success w-100">Register</button>
        </form>

        <p class="text-center mt-3 form-footer">
            Already have an account? <a href="{{ url_for('login') }}">Login here</a>
        </p>
    </div>

    <script>
        function validatePassword() {
            let password = document.querySelector('input[name="password"]').value;
            let confirm = document.querySelector('input[name="confirm_password"]').value;
            let alertArea = document.querySelector(".alert-area");

            alertArea.innerHTML = "";

            if (password !== confirm) {
                alertArea.innerHTML =
                    '<div class="alert alert-danger text-center">Passwords do not match</div>';
                return false;
            }

            return true;
        }
    </script>

</body>
</html>
