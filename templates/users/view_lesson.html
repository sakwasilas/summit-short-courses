<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson View</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f3f3f3;
            font-family: Arial, sans-serif;
            color: #333;
        }

        .top-header {
            background: #ffffff;
            border-bottom: 1px solid #dcdcdc;
            padding: 20px 30px;
            font-size: 18px;
            font-weight: 500;
        }

        .page-wrapper {
            display: flex;
            gap: 20px;
            padding: 30px 20px;
        }

        .sidebar {
            width: 120px;
        }

        .menu-btn {
            background: #1296c9;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 13px;
        }

        .menu-panel {
            display: none;
            margin-top: 12px;
            background: white;
            border: 1px solid #dcdcdc;
            border-radius: 6px;
            width: 250px;
        }

        .menu-panel.show {
            display: block;
        }

        .menu-link {
            display: block;
            padding: 10px 16px;
            text-decoration: none;
            color: #333;
            border-bottom: 1px solid #efefef;
        }

        .menu-link.active {
            background: #1296c9;
            color: white;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .content-wrapper {
            width: 100%;
            max-width: 1000px;
        }

        .lesson-card {
            background: white;
            border-radius: 10px;
            border: 1px solid #dcdcdc;
        }

        .lesson-body {
            padding: 30px;
        }

        .chapter-title {
            color: #1697da;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .lesson-content {
            line-height: 1.8;
            white-space: pre-line;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

<div class="top-header">
    {{ lesson.module.course.name }}
</div>

<div class="page-wrapper">

    <!-- Sidebar -->
    <div class="sidebar">
        <button class="menu-btn" onclick="toggleMenu()">Menu</button>

        <div class="menu-panel" id="menuPanel">
            {% for item in modules_with_lessons %}
                {% for l in item.lessons %}
                    <a href="{{ url_for('view_lesson', lesson_id=l.id) }}"
                       class="menu-link {% if l.id == lesson.id %}active{% endif %}">
                        {{ l.title }}
                    </a>
                {% endfor %}
            {% endfor %}
        </div>
    </div>

    <!-- Main -->
    <div class="main-content">
        <div class="content-wrapper">

            <h4>{{ lesson.title }}</h4>

            <div class="lesson-card">
                <div class="lesson-body">

                    <!-- Dynamic Title -->
                    <div class="chapter-title" id="chapterTitle"></div>

                    <!-- Dynamic Content -->
                    <div class="lesson-content" id="lessonContent"></div>

                    <!-- Progress -->
                    <div class="text-muted mt-3" id="progressText"></div>

                    <!-- Buttons -->
                    <div class="d-flex justify-content-between mt-4">
                        <button class="btn btn-secondary" onclick="prevStep()" id="prevBtn">Previous</button>
                        <button class="btn btn-primary" onclick="nextStep()" id="nextBtn">Next</button>
                    </div>

                </div>
            </div>

        </div>
    </div>

</div>

<!-- ✅ CORRECT DATA SOURCE -->
<script>
    const lessonData = {{ lesson_data | tojson }};
    const practicalTask = {{ lesson.practical_task | tojson }};
</script>

<!-- UI Script -->
<script>
    function toggleMenu() {
        document.getElementById("menuPanel").classList.toggle("show");
    }

    let steps = [];
    let currentStep = 0;

    function buildSteps() {
        steps = [
            {
                title: "Introduction",
                content: lessonData.introduction
            },
            {
                title: "Course Outline",
                content: lessonData.outline
            },
            ...lessonData.chapters.map(ch => ({
                title: ch.title,
                content: ch.content
            }))
        ];

        // ✅ Add practical task as last step (if exists)
        if (practicalTask) {
            steps.push({
                title: "Practical Task",
                content: practicalTask
            });
        }
    }

    function renderStep() {
        document.getElementById("chapterTitle").innerText = steps[currentStep].title;
        document.getElementById("lessonContent").innerText = steps[currentStep].content;

        document.getElementById("progressText").innerText =
            `Step ${currentStep + 1} of ${steps.length}`;

        document.getElementById("prevBtn").disabled = currentStep === 0;
        document.getElementById("nextBtn").disabled = currentStep === steps.length - 1;
    }

    function nextStep() {
        if (currentStep < steps.length - 1) {
            currentStep++;
            renderStep();
        }
    }

    function prevStep() {
        if (currentStep > 0) {
            currentStep--;
            renderStep();
        }
    }

    buildSteps();
    renderStep();
</script>

</body>
</html>
