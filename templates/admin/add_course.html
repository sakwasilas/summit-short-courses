<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .course-card {
            max-width: 700px;
            margin: 40px auto;
            border-radius: 12px;
            padding: 25px;
        }

        .title {
            color: #4e73df;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow course-card">
        <h2 class="text-center title mb-4">Add Course</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-info text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Course Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter course name" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Save Course</button>
        </form>

        <hr>

        <h5 class="mt-4">Available Courses</h5>
        <ul class="list-group">
            {% for course in courses %}
                <li class="list-group-item">{{ course.name }}</li>
            {% endfor %}
        </ul>

        <div class="mt-3">
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Back</a>
        </div>
    </div>
</div>

</body>
</html>
