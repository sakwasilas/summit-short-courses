<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Lesson</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm" style="max-width: 700px; margin: auto;">
        <div class="card-header">
            <h4 class="mb-0">Upload Lesson for {{ module.name }}</h4>
        </div>

        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">Lesson Title</label>
                    <input type="text" name="title" class="form-control"
                           placeholder="Optional, file name will be used if left empty">
                </div>

                <div class="mb-3">
                    <label class="form-label">DOCX File</label>
                    <input type="file" name="lesson_file" class="form-control" accept=".docx" required>
                    <small class="text-muted">
                        Upload one Word file containing Introduction, Course Outline, Chapters, and Practical Task.
                    </small>
                </div>

                <button type="submit" class="btn btn-primary w-100">Upload Lesson</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
