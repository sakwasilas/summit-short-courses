<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Lesson</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="card shadow p-4" style="max-width:700px; margin:auto;">
        <h2 class="text-center mb-4">Add Lesson</h2>

        <div class="mb-3">
            <label class="form-label"><strong>Selected Course</strong></label>
            <input type="text" class="form-control" value="{{ module.course.name }}" readonly>
        </div>

        <div class="mb-3">
            <label class="form-label"><strong>Selected Module</strong></label>
            <input type="text" class="form-control" value="{{ module.name }}" readonly>
        </div>

        <form method="POST">

            <!-- Title -->
            <div class="mb-3">
                <label class="form-label">Lesson Title</label>
                <input type="text" name="title" class="form-control" required>
            </div>

            <!-- Introduction -->
            <div class="mb-3">
                <label class="form-label">Introduction</label>
                <textarea name="introduction" class="form-control" rows="4" required></textarea>
            </div>

            <!-- Outline -->
            <div class="mb-3">
                <label class="form-label">Course Outline</label>
                <textarea name="outline" class="form-control" rows="4" required></textarea>
            </div>

            <!-- Chapters -->
            <h5 class="mt-4">Chapters</h5>

            <div id="chaptersContainer">
                <div class="chapter mb-3">
                    <input type="text" name="chapter_title[]" placeholder="Chapter Title" class="form-control mb-2" required>
                    <textarea name="chapter_content[]" placeholder="Chapter Content" class="form-control" rows="3" required></textarea>
                </div>
            </div>

            <!-- Add Chapter Button -->
            <button type="button" class="btn btn-outline-primary mb-3" onclick="addChapter()">
                + Add Another Chapter
            </button>

            <!-- Practical Task -->
            <div class="mb-3">
                <label class="form-label">Practical Task</label>
                <textarea name="practical_task" class="form-control" rows="4"></textarea>
            </div>

            <!-- Order -->
            <div class="mb-3">
                <label class="form-label">Lesson Order</label>
                <input type="number" name="lesson_order" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success w-100">Save Lesson</button>
        </form>

        <div class="mt-3">
            <a href="{{ url_for('teacher_dashboard') }}" class="btn btn-secondary">Back</a>
        </div>
    </div>
</div>

<!-- 🔥 JS for dynamic chapters -->
<script>
function addChapter() {
    const container = document.getElementById("chaptersContainer");

    const div = document.createElement("div");
    div.classList.add("chapter", "mb-3");

    div.innerHTML = `
        <input type="text" name="chapter_title[]" placeholder="Chapter Title" class="form-control mb-2" required>
        <textarea name="chapter_content[]" placeholder="Chapter Content" class="form-control" rows="3" required></textarea>
    `;

    container.appendChild(div);
}
</script>

</body>
</html>
